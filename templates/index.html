<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新闻简报助手 - News Digest Assistant</title>
    <!-- Modern Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(20, 27, 45, 0.65);
            --card-bg: rgba(28, 38, 62, 0.45);
            --card-hover: rgba(40, 55, 90, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --border-glow: rgba(0, 229, 255, 0.2);
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --accent-primary: #00e5ff;
            --accent-primary-hover: #00b8d4;
            --accent-secondary: #10b981;
            --accent-secondary-hover: #059669;
            --danger-color: #f43f5e;
            --danger-hover: #e11d48;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-title: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 229, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(11, 15, 25, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        header {
            padding: 1.75rem 2.5rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            font-size: 2.25rem;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            font-family: var(--font-title);
        }

        h1 {
            font-family: var(--font-title);
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .date-badge {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border-color);
            padding: 0.35rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary);
            font-family: var(--font-title);
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        /* Buttons styling */
        .btn {
            font-family: var(--font-main);
            font-size: 0.9rem;
            font-weight: 500;
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-secondary), #059669);
            color: white;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(16, 185, 129, 0.35);
            background: linear-gradient(135deg, var(--accent-secondary-hover), #047857);
        }
        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background: rgba(244, 63, 94, 0.1);
            color: var(--danger-color);
            border: 1px solid rgba(244, 63, 94, 0.2);
        }
        .btn-danger:hover {
            background: var(--danger-color);
            color: white;
            box-shadow: 0 4px 12px rgba(244, 63, 94, 0.25);
        }

        .main-container {
            max-width: 1400px;
            width: 100%;
            margin: 2rem auto;
            padding: 0 2rem;
            flex-grow: 1;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 2rem;
        }

        /* Sidebar Navigation */
        .sidebar {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem 1rem;
            backdrop-filter: blur(16px);
            height: fit-content;
            position: sticky;
            top: 6.5rem;
        }

        .nav-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            padding-left: 0.75rem;
            font-weight: 600;
        }

        .nav-menu {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .nav-item {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
        }
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
        }
        .nav-item.active {
            background: rgba(0, 229, 255, 0.1);
            color: var(--accent-primary);
            border-left: 3px solid var(--accent-primary);
            padding-left: calc(1rem - 3px);
        }

        .nav-badge {
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-primary);
            padding: 0.15rem 0.5rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .nav-item.active .nav-badge {
            background: var(--accent-primary);
            color: var(--bg-color);
        }

        /* News Section */
        .content-area {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .section-title {
            font-family: var(--font-title);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .select-all-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .news-deck {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }

        /* News Card */
        .news-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            position: relative;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 1.25rem;
        }
        .news-card:hover {
            background: var(--card-hover);
            transform: translateY(-2px);
            border-color: var(--border-glow);
            box-shadow: 0 8px 30px rgba(0, 229, 255, 0.06);
        }
        .news-card.checked {
            border-color: rgba(16, 185, 129, 0.4);
            background: rgba(16, 185, 129, 0.04);
            box-shadow: 0 8px 30px rgba(16, 185, 129, 0.04);
        }

        /* Checkbox custom design */
        .card-checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            padding-top: 0.25rem;
        }
        .custom-checkbox {
            width: 22px;
            height: 22px;
            border: 2px solid var(--text-secondary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
            background: transparent;
        }
        .news-card.checked .custom-checkbox {
            background: var(--accent-secondary);
            border-color: var(--accent-secondary);
        }
        .custom-checkbox::after {
            content: '';
            width: 6px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg) scale(0);
            transition: transform 0.2s ease;
            position: absolute;
            top: 2px;
        }
        .news-card.checked .custom-checkbox::after {
            transform: rotate(45deg) scale(1);
        }

        .card-content {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .card-meta {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.75rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .topic-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }
        .topic-badge.nexperia {
            background: rgba(0, 229, 255, 0.12);
            color: var(--accent-primary);
        }
        .topic-badge.cloning {
            background: rgba(16, 185, 129, 0.12);
            color: var(--accent-secondary);
        }

        .lang-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 0.15rem 0.35rem;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .source-name {
            font-weight: 500;
            color: var(--text-primary);
        }

        .bullet-dot {
            width: 4px;
            height: 4px;
            background-color: var(--text-secondary);
            border-radius: 50%;
            display: inline-block;
        }

        .card-title-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .card-title {
            font-family: var(--font-title);
            font-size: 1.15rem;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-primary);
            text-decoration: none;
        }
        .card-title:hover {
            color: var(--accent-primary);
        }

        .toggle-lang-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 0.2rem 0.4rem;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-secondary);
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .toggle-lang-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .card-summary {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.015);
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border-left: 2px solid var(--border-color);
        }

        .orig-text {
            display: none;
            font-style: italic;
            border-color: rgba(0, 229, 255, 0.2);
            background: rgba(0, 229, 255, 0.01);
            margin-top: 0.5rem;
        }
        .orig-text.visible {
            display: block;
        }

        /* Empty State */
        .empty-state {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 4rem 2rem;
            text-align: center;
            backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .empty-icon {
            font-size: 3rem;
            opacity: 0.5;
        }

        .empty-title {
            font-family: var(--font-title);
            font-size: 1.25rem;
            font-weight: 500;
        }

        .empty-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
            max-width: 400px;
        }

        /* Toast notifications */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(20, 27, 45, 0.95);
            border: 1px solid var(--accent-secondary);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.15);
            color: var(--text-primary);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(12px);
        }
        .toast.visible {
            transform: translateY(0);
            opacity: 1;
        }
        .toast-icon {
            color: var(--accent-secondary);
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Overlay / Modal for Shutdown */
        .shutdown-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(11, 15, 25, 0.9);
            backdrop-filter: blur(20px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .shutdown-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .shutdown-box {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            padding: 3rem;
            border-radius: 24px;
            text-align: center;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.25rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .shutdown-success-icon {
            font-size: 4rem;
            color: var(--accent-primary);
            margin-bottom: 0.5rem;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @media (max-width: 900px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .sidebar {
                position: static;
                margin-bottom: 1rem;
            }
            header {
                flex-direction: column;
                gap: 1rem;
                align-items: stretch;
                text-align: center;
            }
            .header-title-container {
                justify-content: center;
            }
            .header-actions {
                justify-content: center;
            }
        }

        .date-group-header {
            font-family: var(--font-title);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-primary);
            margin: 1.75rem 0 0.85rem 0;
            padding-bottom: 0.35rem;
            border-bottom: 1px dashed rgba(0, 229, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .date-group-header:first-of-type {
            margin-top: 0.5rem;
        }

        .empty-icon-spinning {
            font-size: 3rem;
            color: var(--accent-primary);
            animation: spin 2s linear infinite;
            margin-bottom: 0.5rem;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title-container">
            <div class="logo-icon">▲</div>
            <div>
                <h1>新闻简报助手</h1>
            </div>
            <span class="date-badge" id="current-date">正在获取日期...</span>
        </div>
        <div class="header-actions">
            <button class="btn btn-secondary" id="btn-mark-all-read" onclick="markAllRead()">全部标记已读</button>
            <button class="btn btn-primary" id="btn-save-selected" onclick="saveSelected()">
                <span>✓</span> 保存选中的简报
            </button>
            <button class="btn btn-danger" id="btn-close-app" onclick="shutdownServer()">看完并关闭</button>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="nav-title">分类筛选</div>
            <ul class="nav-menu">
                <li class="nav-item active" id="tab-all" onclick="switchTab('all')">
                    <span>全部新闻</span>
                    <span class="nav-badge" id="badge-all">0</span>
                </li>
                <li class="nav-item" id="tab-nexperia" onclick="switchTab('nexperia')">
                    <span>安世半导体</span>
                    <span class="nav-badge" id="badge-nexperia">0</span>
                </li>
                <li class="nav-item" id="tab-cloning" onclick="switchTab('cloning')">
                    <span>克隆与基因编辑</span>
                    <span class="nav-badge" id="badge-cloning">0</span>
                </li>
            </ul>
        </aside>

        <main class="content-area">
            <div class="section-header">
                <div class="section-title" id="content-title">今日最新资讯</div>
                <div class="select-all-container" onclick="toggleSelectAll()">
                    <input type="checkbox" id="checkbox-select-all" style="cursor: pointer; pointer-events: none;">
                    <span id="label-select-all">全选所有</span>
                </div>
            </div>

            <div class="news-deck" id="news-container">
                <!-- Cards dynamically loaded here -->
            </div>
        </main>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span id="toast-message">保存成功！已保存到简报数据库并更新 Markdown。</span>
    </div>

    <!-- Shutdown Success Overlay -->
    <div class="shutdown-overlay" id="shutdown-overlay">
        <div class="shutdown-box">
            <div class="shutdown-success-icon">✦</div>
            <h2 style="font-family: var(--font-title); font-size: 1.5rem;">服务已安全关闭</h2>
            <p style="color: var(--text-secondary); font-size: 0.95rem; line-height: 1.6;">
                后台数据服务器已安全停止运行。今天的简报文档已为您整理好，保存在了项目文件夹的 <code>briefings/</code> 目录下。<br><br>
                <strong>现在，您可以安全地关闭此浏览器标签页。</strong>
            </p>
        </div>
    </div>

    <script>
        let allNews = [];
        let currentTab = 'all';
        let isSelectAll = false;
        let isFetchingToday = false;

        // Fetch date formatting
        document.getElementById('current-date').innerText = new Date().toLocaleDateString('zh-CN', {
            year: 'numeric',
            month: 'long',
            day: 'numeric',
            weekday: 'long'
        });

        // Fetch news on page load
        async function fetchNews() {
            try {
                const response = await fetch('/api/news');
                const data = await response.json();
                allNews = data.items || [];
                isFetchingToday = data.is_fetching || false;
                
                // Add checked property locally
                allNews = allNews.map(item => ({ ...item, checked: false }));
                
                updateBadges();
                renderNews();

                // If currently fetching in the background, poll every 5 seconds for updates
                if (isFetchingToday) {
                    setTimeout(fetchNews, 5000);
                }
            } catch (error) {
                console.error("Error fetching news:", error);
                document.getElementById('news-container').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">⚠</div>
                        <div class="empty-title">数据加载失败</div>
                        <div class="empty-desc">无法连接到本地后端服务。请确保 FastAPI 服务器正在运行。</div>
                    </div>
                `;
            }
        }

        function updateBadges() {
            const counts = {
                all: allNews.length,
                nexperia: allNews.filter(n => n.topic === 'nexperia').length,
                cloning: allNews.filter(n => n.topic === 'cloning').length
            };
            document.getElementById('badge-all').innerText = counts.all;
            document.getElementById('badge-nexperia').innerText = counts.nexperia;
            document.getElementById('badge-cloning').innerText = counts.cloning;
        }

        function switchTab(tab) {
            currentTab = tab;
            
            // UI tab class toggle
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            
            // Adjust title
            const titles = {
                all: '今日最新资讯',
                nexperia: '安世半导体与半导体行业动态',
                cloning: '克隆与基因编辑行业前沿'
            };
            document.getElementById('content-title').innerText = titles[tab];
            
            // Reset select all checkbox
            isSelectAll = false;
            document.getElementById('checkbox-select-all').checked = false;
            
            renderNews();
        }

        function renderNews() {
            const container = document.getElementById('news-container');
            const filtered = allNews.filter(item => currentTab === 'all' || item.topic === currentTab);
            
            if (filtered.length === 0) {
                if (isFetchingToday) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon-spinning">⚙</div>
                            <div class="empty-title">正在为您获取并翻译今日资讯...</div>
                            <div class="empty-desc">系统检测到今日新闻尚未抓取，正在进行多语言数据采集和自动翻译，请稍候。系统会自动为您刷新数据。</div>
                        </div>
                    `;
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">☕</div>
                            <div class="empty-title">暂无未读新闻</div>
                            <div class="empty-desc">没有找到未读的采集数据。您可以稍后再试，或检查抓取服务是否在 6:30 正常运行。</div>
                        </div>
                    `;
                }
                return;
            }

            container.innerHTML = '';
            
            // Group by fetch_date
            const groups = {};
            filtered.forEach(item => {
                const date = item.fetch_date || '未知日期';
                if (!groups[date]) {
                    groups[date] = [];
                }
                groups[date].push(item);
            });
            
            // Sort dates descending
            const sortedDates = Object.keys(groups).sort().reverse();
            
            sortedDates.forEach(date => {
                // Add a date header section
                const dateHeader = document.createElement('div');
                dateHeader.className = 'date-group-header';
                dateHeader.innerHTML = `
                    <span>📅 ${date}</span>
                    <button class="toggle-lang-btn" onclick="markDateAsRead('${date}')" style="margin-left:auto; font-size:0.75rem; border-color: rgba(0, 229, 255, 0.3); color: var(--accent-primary);">
                        此日标记已读
                    </button>
                `;
                container.appendChild(dateHeader);
                
                groups[date].forEach(item => {
                    const card = document.createElement('div');
                    card.id = `card-${item.id}`;
                    card.className = `news-card ${item.checked ? 'checked' : ''}`;
                    
                    // Add event listener to card body to toggle checked
                    card.onclick = (e) => {
                        // Prevent toggle if user clicked on original links or lang toggle button
                        if (e.target.tagName === 'A' || e.target.closest('button') || e.target.closest('.toggle-lang-btn')) {
                            return;
                        }
                        toggleCardCheck(item.id);
                    };

                    const isTranslated = item.lang && item.lang !== 'zh';
                    const topicName = item.topic === 'nexperia' ? '安世半导体' : '生物克隆/基因编辑';
                    const langLabel = item.lang ? item.lang.toUpperCase() : 'ZH';
                    
                    // Format pubDate nicely
                    let pubDateClean = item.publish_date || '未知时间';
                    if (pubDateClean.includes('GMT')) {
                        // Try parsing and formatting GMT dates
                        try {
                            const d = new Date(pubDateClean);
                            pubDateClean = d.toLocaleString('zh-CN', { hour12: false });
                        } catch(e) {}
                    }

                    card.innerHTML = `
                        <div class="card-checkbox-wrapper">
                            <div class="custom-checkbox"></div>
                        </div>
                        <div class="card-content">
                            <div class="card-meta">
                                <span class="topic-badge ${item.topic}">${topicName}</span>
                                <span class="lang-badge">${langLabel}</span>
                                <span class="source-name">${item.source}</span>
                                <span class="bullet-dot"></span>
                                <span class="publish-time">发布时间: ${pubDateClean}</span>
                                <span class="bullet-dot"></span>
                                <span class="fetch-time">采集日期: ${item.fetch_date}</span>
                            </div>
                            
                            <div class="card-title-container">
                                <a href="${item.original_url}" target="_blank" class="card-title" id="title-text-${item.id}">
                                    ${item.title_zh || item.title_orig}
                                </a>
                                <div style="display:flex; gap:0.5rem; align-items:center;">
                                    ${isTranslated ? `
                                        <button class="toggle-lang-btn" onclick="toggleTranslation(${item.id})">
                                            对照原文
                                        </button>
                                    ` : ''}
                                    <button class="toggle-lang-btn" onclick="ignoreArticle(${item.id})" style="border-color: rgba(244, 63, 94, 0.3); color: var(--danger-color);">
                                        忽略
                                    </button>
                                </div>
                            </div>
                            
                            <div class="card-summary" id="summary-text-${item.id}">
                                ${item.summary_zh || item.summary_orig}
                            </div>
                            
                            ${isTranslated ? `
                                <div class="card-summary orig-text" id="orig-block-${item.id}">
                                    <strong style="display:block; margin-bottom:0.25rem; font-size:0.8rem; text-transform:uppercase; color:var(--accent-primary);">Original [${langLabel}]</strong>
                                    <div style="margin-bottom:0.5rem; font-weight:600; color:var(--text-primary); font-family:var(--font-title);">${item.title_orig}</div>
                                    <div>${item.summary_orig}</div>
                                </div>
                            ` : ''}
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function toggleCardCheck(id) {
            const item = allNews.find(n => n.id === id);
            if (item) {
                item.checked = !item.checked;
                const card = document.getElementById(`card-${id}`);
                if (card) {
                    if (item.checked) card.classList.add('checked');
                    else card.classList.remove('checked');
                }
            }
            // Check if all displayed are checked to update master checkbox
            const filtered = allNews.filter(n => currentTab === 'all' || n.topic === currentTab);
            const allChecked = filtered.every(n => n.checked);
            document.getElementById('checkbox-select-all').checked = allChecked;
            isSelectAll = allChecked;
        }

        function toggleSelectAll() {
            isSelectAll = !isSelectAll;
            document.getElementById('checkbox-select-all').checked = isSelectAll;
            
            const filtered = allNews.filter(item => currentTab === 'all' || item.topic === currentTab);
            filtered.forEach(item => {
                item.checked = isSelectAll;
                const card = document.getElementById(`card-${item.id}`);
                if (card) {
                    if (isSelectAll) card.classList.add('checked');
                    else card.classList.remove('checked');
                }
            });
        }

        function toggleTranslation(id) {
            const block = document.getElementById(`orig-block-${id}`);
            if (block) {
                block.classList.toggle('visible');
            }
        }

        // Show Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').innerText = message;
            toast.classList.add('visible');
            setTimeout(() => {
                toast.classList.remove('visible');
            }, 4000);
        }

        // Save Selected News
        async function saveSelected() {
            const selectedIds = allNews.filter(n => n.checked).map(n => n.id);
            if (selectedIds.length === 0) {
                alert("请先勾选需要保存的新闻条目。");
                return;
            }

            try {
                const response = await fetch('/api/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ids: selectedIds })
                });
                
                if (response.ok) {
                    showToast(`已成功将 ${selectedIds.length} 条资讯保存到简报库并写入今日 Markdown 简报！`);
                    // Remove saved items from local list (since they are now processed/read)
                    allNews = allNews.filter(n => !selectedIds.includes(n.id));
                    updateBadges();
                    renderNews();
                    
                    // Reset select all checkbox
                    isSelectAll = false;
                    document.getElementById('checkbox-select-all').checked = false;
                } else {
                    const data = await response.json();
                    alert(`保存失败: ${data.detail || '未知错误'}`);
                }
            } catch (error) {
                console.error("Error saving news:", error);
                alert("保存失败，无法连接到后端服务器。");
            }
        }

        // Mark All Read (without saving)
        async function markAllRead() {
            const filtered = allNews.filter(item => currentTab === 'all' || item.topic === currentTab);
            if (filtered.length === 0) return;
            
            const ids = filtered.map(item => item.id);
            if (!confirm(`确定将这 ${ids.length} 条新闻标记为已读吗？它们将不会保存到简报。`)) {
                return;
            }

            try {
                const response = await fetch('/api/mark_read', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ids: ids })
                });

                if (response.ok) {
                    showToast("已成功将所选分类新闻标记为已读。");
                    allNews = allNews.filter(n => !ids.includes(n.id));
                    updateBadges();
                    renderNews();
                }
            } catch (error) {
                console.error("Error marking news as read:", error);
            }
        }

        // Mark individual article as read
        async function ignoreArticle(id) {
            try {
                const response = await fetch('/api/mark_read', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ids: [id] })
                });

                if (response.ok) {
                    showToast("已忽略该新闻条目。");
                    allNews = allNews.filter(n => n.id !== id);
                    updateBadges();
                    renderNews();
                }
            } catch (error) {
                console.error("Error marking article as read:", error);
            }
        }

        // Mark all articles of a specific date as read
        async function markDateAsRead(date) {
            const dateNews = allNews.filter(n => (n.fetch_date === date) && (currentTab === 'all' || n.topic === currentTab));
            if (dateNews.length === 0) return;
            
            const ids = dateNews.map(n => n.id);
            if (!confirm(`确定将 ${date} 的这 ${ids.length} 条新闻标记为已读吗？`)) {
                return;
            }

            try {
                const response = await fetch('/api/mark_read', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ ids: ids })
                });

                if (response.ok) {
                    showToast(`已将 ${date} 的新闻标记为已读。`);
                    allNews = allNews.filter(n => !ids.includes(n.id));
                    updateBadges();
                    renderNews();
                }
            } catch (error) {
                console.error("Error marking date news as read:", error);
            }
        }

        // Programmatic shutdown
        async function shutdownServer() {
            if (allNews.some(n => n.checked)) {
                if (confirm("您有勾选的新闻尚未保存。是否立即保存并关闭？")) {
                    await saveSelected();
                }
            }

            try {
                // Show overlay first
                document.getElementById('shutdown-overlay').classList.add('visible');
                
                // Call shutdown endpoint
                fetch('/api/shutdown', { method: 'POST' });
                
                // Try window close after a short delay
                setTimeout(() => {
                    window.close();
                }, 5000);
            } catch (error) {
                console.error("Error stopping server:", error);
            }
        }

        // Run fetch on load
        fetchNews();
    </script>
</body>
</html>
